apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: discovery-server
  namespace: petclinic

spec:
  interval: 5m

  chart:
    spec:
      chart: ./apps/discovery-server

      sourceRef:
        kind: GitRepository
        name: petclinic-gitops
        namespace: flux-system

  values:
    replicaCount: 1

    image:
      repository: alihamza9/petclinic-discovery-server
      tag: "dummy"
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 8761

    containerPort: 8761
