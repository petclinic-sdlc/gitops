apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: config-server
  namespace: petclinic

spec:
  interval: 5m

  chart:
    spec:
      chart: ./apps/config-server
      reconcileStrategy: Revision
      
      sourceRef:
        kind: GitRepository
        name: petclinic-gitops
        namespace: flux-system

  valuesFrom: []
