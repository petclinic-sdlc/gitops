apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: config-server-automation
  namespace: flux-system

spec:
  interval: 1m

  sourceRef:
    kind: GitRepository
    name: petclinic-gitops

  git:
    checkout:
      ref:
        branch: main

    commit:
      author:
        name: fluxcd
        email: fluxcd@users.noreply.github.com

      messageTemplate: |
        chore: update config-server image tag

    push:
      branch: main

  update:
    strategy: Setters
    path: ./
