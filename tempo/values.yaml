tempo:
  retention: 6h

  structuredConfig:
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        zipkin:
          protocols:
            http: {}

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1000000
      max_block_duration: 5m

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces

    querier: {}
    query_frontend: {}

    overrides:
      defaults: {}

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi