multitenancyEnabled: false

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

tempoQuery:
  enabled: false

config: |
  server:
    http_listen_port: 3200

  distributor:
    receivers:
      zipkin:
        endpoint: 0.0.0.0:9411

  ingester: {}

  compactor:
    compaction:
      block_retention: 6h

  storage:
    trace:
      backend: local
      local:
        path: /tmp/tempo/traces
      wal:
        path: /tmp/tempo/wal

  querier: {}

  query_frontend: {}