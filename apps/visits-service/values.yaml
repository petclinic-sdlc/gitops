replicaCount: 1
image:
  repository: alihamza9/petclinic-visits-service
  tag: "" # {"$imagepolicy": "flux-system:visits-service-policy:tag"}
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8082
