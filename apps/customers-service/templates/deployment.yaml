apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Chart.Name }}

  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}

    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.SPRING_PROFILES_ACTIVE | quote }}
          
            - name: CONFIG_SERVER_URL
              value: {{ .Values.config.CONFIG_SERVER_URL | quote }}
          
            - name: EUREKA_SERVER_URL
              value: {{ .Values.config.EUREKA_SERVER_URL | quote }}
          
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.config.SPRING_DATASOURCE_URL | quote }}
          
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.config.SPRING_DATASOURCE_USERNAME | quote }}
          
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.config.SPRING_DATASOURCE_PASSWORD | quote }}
          
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: {{ .Values.config.SPRING_JPA_HIBERNATE_DDL_AUTO | default "update" | quote }}
            
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"

            - name: MANAGEMENT_EXPORT_ZIPKIN_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:9411/api/v2/spans"

            - name: SPRING_CLOUD_CONFIG_OVERRIDESYSTEMPROPERTIES
              value: "false"